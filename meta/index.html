<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta</title>

  <link rel="stylesheet" href="../style.css">

  <script type="module" src="../global.js"></script>
  <script type="module" src="main.js"></script>
</head>

<body>
  <h1>Meta</h1>
  <p>This page includes stats about the code of my portfolio website.</p>

  <div class="slider-container">
    <label for="commit-progress">
      Show commits until:
    </label>

    <input
      type="range"
      id="commit-progress"
      min="0"
      max="100"
      value="100"
    >

    <time id="commit-time"></time>
  </div>

  <div id="stats"></div>

  <h2>Evolution over time</h2>

  <div id="scrolly-1">
    <div id="scatter-story"></div>

    <div id="scatter-plot">
      <h2>Commits by time of day</h2>
      <div id="chart"></div>
      <p id="selection-count">No commits selected</p>
      <dl id="language-breakdown" class="stats"></dl>
    </div>
  </div>

  <div id="scrolly-2">
    <div id="files-section">
      <h2>Files</h2>
      <dl id="files"></dl>
    </div>

    <div id="files-story"></div>
  </div>

  <dl id="commit-tooltip" class="info tooltip" hidden>
    <dt>Commit</dt>
    <dd>
      <a href="" id="commit-link" target="_blank"></a>
    </dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Time</dt>
    <dd id="tooltip-commit-time"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines edited</dt>
    <dd id="commit-lines"></dd>
  </dl>
</body>
</html>
